{% extends "base.html" %}
{% block title %}{% if editing %}Edit{% else %}New{% endif %} Recording | NexusMeet{% endblock %}
{% block page_title %}{% if editing %}Edit Recording{% else %}New Recording{% endif %}{% endblock %}
{% block content %}
<div class="card" style="max-width:750px">
  <form method="post">
    {% csrf_token %}
    <div class="form-row">
      <div class="form-group">
        <label>Title</label>
        <input type="text" name="title" value="{{ record.title|default:'' }}">
      </div>
      <div class="form-group">
        <label>Meeting Title</label>
        <input type="text" name="meeting_title" value="{{ record.meeting_title|default:'' }}">
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Duration Mins</label>
        <input type="number" name="duration_mins" value="{{ record.duration_mins|default:'0' }}">
      </div>
      <div class="form-group">
        <label>Size Mb</label>
        <input type="number" step="0.01" name="size_mb" value="{{ record.size_mb|default:'0' }}">
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Date</label>
        <input type="date" name="date" value="{{ record.date|date:'Y-m-d'|default:'' }}">
      </div>
      <div class="form-group">
        <label>Status</label>
        <select name="status">
          <option value="processing" {% if record.status == 'processing' %}selected{% endif %}>Processing</option>
          <option value="ready" {% if record.status == 'ready' %}selected{% endif %}>Ready</option>
          <option value="expired" {% if record.status == 'expired' %}selected{% endif %}>Expired</option>
        </select>
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Download Url</label>
        <input type="url" name="download_url" value="{{ record.download_url|default:'' }}">
      </div>
    </div>

    <div style="display:flex;gap:0.75rem;margin-top:1rem">
      <button type="submit" class="btn btn-primary">{% if editing %}Update{% else %}Create{% endif %} Recording</button>
      <a href="/recordings/" class="btn" style="background:var(--border);color:var(--text)">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
