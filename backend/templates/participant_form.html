{% extends "base.html" %}
{% block title %}{% if editing %}Edit{% else %}New{% endif %} Participant | NexusMeet{% endblock %}
{% block page_title %}{% if editing %}Edit Participant{% else %}New Participant{% endif %}{% endblock %}
{% block content %}
<div class="card" style="max-width:750px">
  <form method="post">
    {% csrf_token %}
    <div class="form-row">
      <div class="form-group">
        <label>Name</label>
        <input type="text" name="name" value="{{ record.name|default:'' }}">
      </div>
      <div class="form-group">
        <label>Email</label>
        <input type="email" name="email" value="{{ record.email|default:'' }}">
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Meeting Title</label>
        <input type="text" name="meeting_title" value="{{ record.meeting_title|default:'' }}">
      </div>
      <div class="form-group">
        <label>Role</label>
        <select name="role">
          <option value="host" {% if record.role == 'host' %}selected{% endif %}>Host</option>
          <option value="co_host" {% if record.role == 'co_host' %}selected{% endif %}>Co Host</option>
          <option value="presenter" {% if record.role == 'presenter' %}selected{% endif %}>Presenter</option>
          <option value="attendee" {% if record.role == 'attendee' %}selected{% endif %}>Attendee</option>
        </select>
      </div>
    </div>
    <div class="form-group">
      <div class="checkbox-wrapper">
        <input type="checkbox" name="joined" id="id_joined" {% if record.joined %}checked{% endif %}>
        <label for="id_joined" style="margin-bottom:0">Joined</label>
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Duration Mins</label>
        <input type="number" name="duration_mins" value="{{ record.duration_mins|default:'0' }}">
      </div>
    </div>

    <div style="display:flex;gap:0.75rem;margin-top:1rem">
      <button type="submit" class="btn btn-primary">{% if editing %}Update{% else %}Create{% endif %} Participant</button>
      <a href="/participants/" class="btn" style="background:var(--border);color:var(--text)">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
